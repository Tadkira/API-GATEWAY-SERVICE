# ============================================================
#  Tadkira — Infrastructure Partagée
#  À lancer UNE SEULE FOIS pour toute l'application.
#  Tous les microservices se connectent à ce réseau.
#
#  Usage : docker-compose -f infra/docker-compose.infra.yml up -d
# ============================================================

version: '3.8'

services:

  # ─── Redis ──────────────────────────────────────────────
  # Utilisé par : API Gateway (rate-limiting), Check-In Service (seat locks)
  redis:
    image: redis:7-alpine
    container_name: tadkira-redis
    ports:
      - '6379:6379'
    command: redis-server --requirepass ${REDIS_PASSWORD:-} --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - tadkira-network

  # ─── RabbitMQ ───────────────────────────────────────────
  # Utilisé par : Check-In Service (publish), Notification Service (consume)
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: tadkira-rabbitmq
    ports:
      - '5672:5672'    # AMQP protocol
      - '15672:15672'  # Management UI → http://localhost:15672
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-tadkira}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-tadkira_pass}
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - tadkira-network

  # ─── MinIO (S3) ─────────────────────────────────────────
  # Utilisé par : OCR Service (images passeport temporaires), Boarding Pass Service (PDFs)
  minio:
    image: minio/minio:latest
    container_name: tadkira-minio
    ports:
      - '9000:9000'    # API S3
      - '9001:9001'    # Console Web → http://localhost:9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-tadkira_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-tadkira_secret}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - tadkira-network

  # ─── MinIO Init (création des buckets au démarrage) ─────
  minio-init:
    image: minio/mc:latest
    container_name: tadkira-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-tadkira_admin} ${MINIO_ROOT_PASSWORD:-tadkira_secret};
      mc mb --ignore-existing local/passport-scans;
      mc mb --ignore-existing local/boarding-passes;
      mc anonymous set download local/boarding-passes;
      echo '✅ MinIO buckets créés : passport-scans, boarding-passes';
      exit 0;
      "
    networks:
      - tadkira-network

# ─── Volumes persistants ────────────────────────────────────
volumes:
  redis-data:
    name: tadkira-redis-data
  rabbitmq-data:
    name: tadkira-rabbitmq-data
  minio-data:
    name: tadkira-minio-data

# ─── Réseau partagé entre tous les microservices ────────────
networks:
  tadkira-network:
    name: tadkira-network
    driver: bridge
