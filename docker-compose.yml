# ============================================================
#  Tadkira — API Gateway Service
#
#  Prérequis : l'infrastructure doit être démarrée en premier.
#  cd infra && docker-compose -f docker-compose.infra.yml up -d
#
#  Usage : docker-compose up -d
# ============================================================

version: '3.8'

services:
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tadkira-gateway
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000

      # JWT (doit correspondre à l'Auth Service)
      JWT_SECRET: ${JWT_SECRET:-tadkira-super-secret-jwt-key-dev-only-32chars}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-24h}

      # Redis — fourni par l'infra partagée
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}

      # URLs des microservices (utilisent les noms de conteneurs sur le réseau partagé)
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:3001}
      FLIGHT_SERVICE_URL: ${FLIGHT_SERVICE_URL:-http://flight-booking-service:3002}
      CHECKIN_SERVICE_URL: ${CHECKIN_SERVICE_URL:-http://checkin-service:3003}
      OCR_SERVICE_URL: ${OCR_SERVICE_URL:-http://ocr-service:3004}
      BOARDING_PASS_SERVICE_URL: ${BOARDING_PASS_SERVICE_URL:-http://boarding-pass-service:3005}

      # Rate Limiting
      THROTTLE_TTL: ${THROTTLE_TTL:-60}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT:-100}

      # Swagger
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-true}
      SWAGGER_PATH: ${SWAGGER_PATH:-api/docs}

    restart: unless-stopped

    # Connexion au réseau partagé créé par l'infra
    networks:
      - tadkira-network

# ─── Réseau externe (géré par infra/docker-compose.infra.yml) ──
networks:
  tadkira-network:
    external: true
    name: tadkira-network
